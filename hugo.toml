baseURL = "https://frankdenneman.nl/"
languageCode = "en-us"
title = "Frank Denneman | Architecting AI Infrastructure"
enableRobotsTXT = true
canonifyURLs = true

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON", "TXT", "LLMSFULL"]
  section = ["HTML", "RSS", "JSON"]

[outputFormats.TXT]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

[outputFormats.LLMSFULL]
  mediaType = "text/plain"
  baseName = "llms-full"
  isPlainText = true
  notAlternative = true

[outputFormats.AIINFRA]
  mediaType = "application/json"
  baseName = "index"
  isPlainText = true
  notAlternative = true  

# Anatole via Hugo Modules
[module]
  [[module.imports]]
    path = "github.com/lxndrblz/anatole"

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  disableThemeSwitcher = true
  description = "Distinguished Engineer and Chief Technologist for AI at VMware Cloud Foundation. Writing about AI infrastructure, GPU platform design, and NUMA-aware architecture."
  customCss = ["css/custom.css"]
  gtagId = "G-XSZJ05LPXJ"

  # Anatole sidebar identity
  title = "Frank Denneman"
  author = "Frank Denneman"
  profilePicture = "images/Headshot-FD.jpeg"
  favicon = "favicons/"
[params.plausibleAnalytics]
  domain = "frankdenneman.nl"
  serverURL = "https://plausible.io"

# Social icons under the profile picture
[[params.socialIcons]]
  icon = "fab fa-linkedin"
  title = "LinkedIn"
  url = "https://www.linkedin.com/in/frankdenneman/"

[[params.socialIcons]]
  icon = "fab fa-github"
  title = "GitHub"
  url = "https://github.com/frankdenneman"

[[params.socialIcons]]
  icon = "fab fa-instagram"
  title = "Instagram"
  url = "https://www.instagram.com/roadtoimmersion"

[[params.socialIcons]]
  icon = "fab fa-twitter"
  title = "X"
  url = "https://x.com/FrankDenneman"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 10

  [[menu.main]]
    name = "AI"
    url = "/categories/ai/"
    weight = 30

  [[menu.main]]
    name = "NUMA"
    url = "/categories/numa/"
    weight = 40

  [[menu.main]]
    name = "AI Infra Series"
    url = "/ai-infrastructure/"
    weight = 42

  [[menu.main]]
    name = "AI Memory Series"
    url = "/understanding-ai-memory/"
    weight = 43

  [[menu.main]]
    name = "Tools"
    url = "/tools/"
    weight = 44

  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 45

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 47

[security.exec]
  # Allow the Node toolcache path used on GitHub Actions runners
  allow = [
    '^(dart-)?sass(-embedded)?$',
    '^go$',
    '^git$',
    '^npx$',
    '^postcss$',
    '^tailwindcss$',
    '^/opt/hostedtoolcache/node/.*/bin/sass$',
    '^/usr/local/bin/sass$'
  ]

[markup.goldmark.renderer]
  unsafe = true